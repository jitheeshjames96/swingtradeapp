server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Node.js backend container
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_api_url http://swing_trading_backend:3000;
        proxy_pass $backend_api_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy health check as well
    location /health {
        resolver 127.0.0.11 valid=10s;
        set $backend_health_url http://swing_trading_backend:3000;
        proxy_pass $backend_health_url/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

version: '3.8'

services:
  # --- PostgreSQL Database Service ---
  db:
    image: postgres:16-alpine
    container_name: swing_trading_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=swing_trading
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # --- Backend REST API Scraper Service ---
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: swing_trading_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:postgres@db:5432/swing_trading
    depends_on:
      - db
    restart: always

  # --- Static Frontend Server ---
  frontend:
    image: nginx:alpine
    container_name: swing_trading_frontend
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./css:/usr/share/nginx/html/css
      - ./js:/usr/share/nginx/html/js
      - ./assets:/usr/share/nginx/html/assets
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
